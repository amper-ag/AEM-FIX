<style type="text/css">
    body {
        font-size: 16px !important;
    }

    /* mobile images  ------------------------------------------------------ */
    .gen-image-desktop {
        display: block;
    }

    .gen-image-mobile {
        display: none;
    }

    @media (orientation: portrait) {
        .gen-image-desktop {
            display: none;
        }

        .gen-image-mobile {
            display: block;
        }
    }

    /* grids  ------------------------------------------------------ */
    .gen-align {
        width: 100%;
        height: 50vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .gen-align-center {
        text-align: center;
    }

    .gen-align-vertical {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: baseline;
    }

    .gen-align-vertical-center {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .gen-grid {
        display: flex;
        column-gap: 15px
    }

    .gen-grid div {
        width: 100%;
    }

    .gen-grid div img {
        display: block;
    }

    @media (orientation: portrait) {
        .gen-grid {
            display: block;
            column-gap: 15px;
        }
    }

    /* boxs ------------------------------------------------------ */
    .gen-box {
        background-color: #f3f3f3;
        padding: 20px;
    }

    /* buttons ------------------------------------------------------ */
    .gen-button {
        transition: all 0.5s ease-in-out;
        display: inline-block;
        cursor: pointer;
        width: auto;
        text-align: center;
        text-decoration: none;
        letter-spacing: 1px;
        font-size: 1em;
        font-weight: 400;
        padding-top: 15px;
        padding-bottom: 15px;
        padding-left: 30px;
        padding-right: 30px;
        border: 0;
    }

    .gen-button:hover {
        opacity: 0.6;
    }

    .gen-button-mini {
        transition: all 0.5s ease-in-out;
        display: inline-block;
        cursor: pointer;
        width: auto;
        text-align: center;
        text-decoration: none;
        letter-spacing: 1px;
        font-size: 1em;
        font-weight: 400;
        padding-top: 5px;
        padding-bottom: 5px;
        padding-left: 45px;
        padding-right: 45px;
        border: 0;
    }

    .gen-button-mini:hover {
        opacity: 0.6;
    }

    .gen-button-red {
        background-color: #e71316;
        color: white !important;
    }

    .gen-button-blue {
        background-color: #262262;
        color: white !important;
    }

    .gen-button-violet {
        background-color: #7474c1;
        color: white !important;
    }

    /* lines ------------------------------------------------------ */
    .gen-line-1 {
        width: 100%;
        height: 2px;
        background-color: #eaeaea
    }

    .gen-line-right {
        position: relative;
    }

    .gen-line-right::after {
        content: "";
        position: absolute;
        right: 0;
        top: 25%;
        width: 1px;
        height: 50%;
        background-color: #ccc;
    }

    /* borders ------------------------------------------------------ */
    .gen-border {
        border: 1px solid #ddd;
    }

    /* titles ------------------------------------------------------ */
    .gen-title-red {
        color: #e71316;
    }

    .gen-title-blue {
        color: #262262;
    }

    .gen-title-violet {
        color: #7474c1;
    }

    /* links ------------------------------------------------------ */
    .gen-link {
        color: #0b9bff;
        text-decoration: underline !important;
        transition: all .5s ease-out;
    }

    .gen-link:hover {
        color: darkgrey;
        text-decoration: none;
    }

    /* toggle ------------------------------------------------------ */
    .gen-toggle {
        cursor: pointer;
        transition: all .5s ease-out;
    }

    .gen-toggle:hover {
        color: #e71316
    }

    .gen-toggle-content {
        display: none;
        animation: fadeIn 0.4s ease;
    }

    .gen-toggle-arrow {
        display: inline-block;
        transition: transform 0.3s ease;
        font-size: 0.8em;
    }

    .gen-toggle.active .gen-toggle-arrow {
        transform: rotate(-180deg);
    }

    .gen-toggle-content.show {
        display: block;
    }

    /* motion  ------------------------------------------------------ */
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-5px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* normalize ------------------------------------------------------ */
    ul {
        margin-block-start: 0;
        margin-block-end: 0;
        padding-inline-start: 0;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
        margin-block-start: 0;
        margin-block-end: 0;
        margin-inline-start: 0;
        margin-inline-end: 0;
        font-weight: normal;
    }

    /* fix aem errors ------------------------------------------------------ */
    .form_leftcol {
        display: flex;
        padding-top: 10px;
    }

    .radio,
    .checkbox {
        padding-left: 0;
        font-size: 12px;
    }
</style>
